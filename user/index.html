<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Bot</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e6e8ee; --mut:#8b90a0; --grn:#22c55e; --red:#ef4444; --blu:#3b82f6; --amb:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
    header { padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
    header .logo { font-weight:800; font-size:18px; } header .logo span { color:var(--blu); }
    header .who { margin-left:auto; color:var(--mut); font-size:13px; }
    header button { background:none; border:1px solid var(--line); color:var(--mut); padding:6px 12px; border-radius:8px; cursor:pointer; }
    .center { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:30px; width:360px; text-align:center; }
    .card h2 { margin:0 0 6px; } .card p { margin:0 0 18px; color:var(--mut); font-size:14px; }
    .btn { width:100%; padding:11px; border:none; border-radius:9px; background:var(--blu); color:#fff; font-weight:600; cursor:pointer; font-size:15px; }
    .err { color:var(--red); font-size:13px; margin-top:10px; }
    .badge { display:inline-block; padding:5px 14px; border-radius:20px; font-size:13px; font-weight:600; margin-bottom:14px; }
    .badge.pending { background:rgba(245,158,11,.15); color:var(--amb); }
    .badge.blocked { background:rgba(239,68,68,.15); color:var(--red); }
    .wrap { max-width:900px; margin:0 auto; padding:26px 22px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; margin-top:8px; }
    .tile { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; position:relative; }
    .tile .ico { font-size:30px; }
    .tile .name { font-weight:700; margin:10px 0 4px; font-size:16px; }
    .tile .state { font-size:13px; color:var(--mut); }
    .tile.on { border-color:rgba(34,197,94,.4); cursor:pointer; transition:.15s; }
    .tile.on:hover { border-color:var(--grn); transform:translateY(-2px); }
    .tile.on .state { color:var(--grn); }
    .tile.off { opacity:.6; }
    .tile .lock { position:absolute; top:16px; right:16px; font-size:16px; }
    .hint { color:var(--mut); font-size:13px; margin-bottom:16px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="center" id="loginView" style="display:none">
    <div class="card">
      <h2>Master&nbsp;<span style="color:var(--blu)">Bot</span></h2>
      <p>Sign in to access your bots</p>
      <button class="btn" id="googleBtn">🔵 Continue with Google</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <!-- PENDING / BLOCKED -->
  <div class="center" id="waitView" style="display:none">
    <div class="card">
      <div class="badge" id="waitBadge"></div>
      <h2 id="waitTitle"></h2>
      <p id="waitMsg"></p>
      <button class="btn" id="waitLogout">Logout</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" style="display:none">
    <header>
      <div class="logo">Master<span>Bot</span></div>
      <div class="who" id="who"></div>
      <button id="logout">Logout</button>
    </header>
    <div class="wrap">
      <div class="hint">Ye tumhare allowed bots hain. 🔒 wale ke liye admin se baat karo.</div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  /* ---------- Supabase (same project) ---------- */
  const SUPABASE_URL = "https://wkuxhbyicpiqssqqnmkt.supabase.co";
  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrdXhoYnlpY3BpcXNzcXFubWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODYwNDAsImV4cCI6MjA5ODQ2MjA0MH0.tQF-0ClEVTxvzLYeTaaZbI4MOLkzHN0wdbyeBo0Spiw";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ---------- Modules (admin file jaisi hi list) ---------- */
  const MODULES = [
    { key: "youtube",    ico:"📹", label: "YouTube Auto-Video",  url:"../../youtube_bot/web/dashboard.html" },
    { key: "whatsapp",   ico:"💬", label: "WhatsApp Auto-Reply", url:"" },
    { key: "reviews",    ico:"⭐", label: "Google Reviews",      url:"" },
    { key: "missedcall", ico:"📞", label: "Missed-call Callback", url:"" },
    { key: "restaurant", ico:"🍔", label: "Restaurant Orders",   url:"" },
  ];

  const $ = (id) => document.getElementById(id);
  const today = () => new Date().toISOString().slice(0,10);
  function show(id){ ["loginView","waitView","dashView"].forEach(v=>$(v).style.display="none"); $(id).style.display = (id==="dashView")?"block":"flex"; }

  (async function boot(){
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) { show("loginView"); return; }
    await afterLogin();
  })();

  $("googleBtn").addEventListener("click", async ()=>{
    const redirectTo = window.location.href.split("#")[0];
    const { error } = await sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo } });
    if (error) $("loginErr").textContent = error.message;
  });
  $("logout").addEventListener("click", async ()=>{ await sb.auth.signOut(); location.reload(); });
  $("waitLogout").addEventListener("click", async ()=>{ await sb.auth.signOut(); location.reload(); });

  async function afterLogin(){
    const { data:{ user } } = await sb.auth.getUser();
    let { data: profile } = await sb.from("profiles").select("*").eq("user_id", user.id).single();
    // safety: agar trigger se profile nahi bana to yahin bana do (pending)
    if (!profile) {
      await sb.from("profiles").insert({ user_id:user.id, email:user.email, role:"user", status:"pending" });
      profile = { status:"pending" };
    }

    if (profile.status === "blocked") {
      $("waitBadge").className="badge blocked"; $("waitBadge").textContent="Blocked";
      $("waitTitle").textContent="Account blocked 🚫";
      $("waitMsg").textContent="Tumhara access band kar diya gaya hai. Admin se baat karo.";
      show("waitView"); return;
    }
    if (profile.status !== "approved") {
      $("waitBadge").className="badge pending"; $("waitBadge").textContent="Pending";
      $("waitTitle").textContent="Waiting for approval ⏳";
      $("waitMsg").textContent="Admin ne abhi tumhe approve nahi kiya. Approve hote hi tumhare bots yahan dikhenge.";
      show("waitView"); return;
    }

    $("who").textContent = user.email;
    const { data: access } = await sb.from("module_access").select("*").eq("user_id", user.id);
    const accMap = {}; (access||[]).forEach(a => accMap[a.module] = a);
    renderModules(accMap);
    show("dashView");
  }

  function renderModules(accMap){
    const grid = $("grid"); grid.innerHTML = "";
    MODULES.forEach(m => {
      const a = accMap[m.key];
      const expired = a?.expiry && a.expiry < today();
      const on = a?.allowed === true && !expired;

      const tile = document.createElement("div");
      tile.className = "tile " + (on ? "on" : "off");
      let state = on ? "✅ Active" + (a.expiry ? ` · till ${a.expiry}` : "")
                     : expired ? "⏰ Expired · contact admin"
                     : "🔒 Locked · contact admin";
      tile.innerHTML = `
        <div class="ico">${m.ico}</div>
        <div class="name">${m.label}</div>
        <div class="state">${state}</div>
        ${on ? "" : '<div class="lock">🔒</div>'}`;
      if (on) tile.onclick = () => { if (m.url) location.href = m.url; else alert("Ye module jaldi aa raha hai 🚀"); };
      grid.appendChild(tile);
    });
  }
  </script>
</body>
</html>
