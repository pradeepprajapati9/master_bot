<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Bot</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e6e8ee; --mut:#8b90a0; --blu:#3b82f6; --grn:#22c55e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt);
           min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .box { text-align:center; max-width:420px; width:100%; }
    .logo { font-weight:800; font-size:34px; margin-bottom:6px; }
    .logo span { color:var(--blu); }
    .sub { color:var(--mut); margin-bottom:30px; }
    .cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    a.card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:26px 16px;
             text-decoration:none; color:var(--txt); transition:.15s; }
    a.card:hover { transform:translateY(-3px); border-color:var(--blu); }
    a.card .ico { font-size:34px; }
    a.card .name { font-weight:700; margin-top:10px; }
    a.card .d { color:var(--mut); font-size:13px; margin-top:4px; }
    .foot { color:var(--mut); font-size:12px; margin-top:26px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Master<span>Bot</span></div>
    <div class="sub">Ek platform · bahut saare bots</div>
    <div class="cards">
      <a class="card" href="user/">
        <div class="ico">👤</div>
        <div class="name">User</div>
        <div class="d">Apne bots kholo</div>
      </a>
      <a class="card" href="admin/">
        <div class="ico">👑</div>
        <div class="name">Admin</div>
        <div class="d">Users manage karo</div>
      </a>
    </div>
    <div class="foot">Powered by Master Bot</div>
  </div>
</body>
</html>
